{% extends "base.html" %}

{% block title %}Recruiter Dashboard{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2>Recruiter Dashboard</h2>

        <p class="lead mb-0">
            Welcome, {{ session.get('display_name') }}!
        </p>

        <p class="text-muted">
            You are logged in as {{ session.get('email') }}.
        </p>

        <div class="d-flex gap-2">

            <a href="{{ url_for('jobs.create_job') }}"
               class="btn btn-primary">
                Post a Job
            </a>

            <a href="{{ url_for('jobs.my_jobs') }}"
               class="btn btn-outline-primary">
                View My Jobs
            </a>

        </div>

    </div>

</div>

{% endblock %}
