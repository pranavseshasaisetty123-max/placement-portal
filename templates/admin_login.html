{% extends "base.html" %}

{% block title %}Admin Portal Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        
        <div class="card border-0 shadow rounded-3">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <span class="fs-1">🛠️</span>
                    <h3 class="fw-bold text-dark mt-2">Admin Login</h3>
                    <p class="text-muted fs-7">Access the Placement Portal management console.</p>
                </div>

                <form action="{{ url_for('admin.login') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary fs-7">Username or Email</label>
                        <input type="text" 
                               class="form-control" 
                               id="username" 
                               name="username" 
                               required 
                               placeholder="e.g. admin or admin@placement.com">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-secondary fs-7">Password</label>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               required 
                               placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold shadow-sm">
                        Access Dashboard &rarr;
                    </button>
                    
                </form>

            </div>
        </div>

    </div>
</div>

<style>
    .fs-7 {
        font-size: 0.85rem;
    }
</style>
{% endblock %}
