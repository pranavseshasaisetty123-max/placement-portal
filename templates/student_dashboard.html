{% extends "base.html" %}

{% block title %}Student Dashboard{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2>Student Dashboard</h2>

        <p class="lead mb-0">
            Welcome, {{ session.get('display_name') }}!
        </p>

        <p class="text-muted">
            You are logged in as {{ session.get('email') }}.
        </p>

        <a href="{{ url_for('jobs.browse_jobs') }}"
           class="btn btn-primary">
            Browse Available Jobs
        </a>

    </div>

</div>

{% endblock %}
