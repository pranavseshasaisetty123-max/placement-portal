{% extends "base.html" %}

{% block title %}Edit Job{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4">Edit Job</h2>

                <form method="POST"
                      action="{{ url_for('jobs.edit_job', job_id=job.job_id) }}">

                    <div class="mb-3">

                        <label class="form-label" for="title">
                            Job Title
                        </label>

                        <input type="text"
                               class="form-control"
                               id="title"
                               name="title"
                               value="{{ job.title }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label" for="location">
                            Location
                        </label>

                        <input type="text"
                               class="form-control"
                               id="location"
                               name="location"
                               value="{{ job.location }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label" for="description">
                            Job Description
                        </label>

                        <textarea class="form-control"
                                  id="description"
                                  name="description"
                                  rows="6"
                                  required>{{ job.description }}</textarea>

                    </div>

                    <div class="d-flex gap-2">

                        <button type="submit"
                                class="btn btn-primary">
                            Save Changes
                        </button>

                        <a href="{{ url_for('jobs.my_jobs') }}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
